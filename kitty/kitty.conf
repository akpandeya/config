# Matrix-style kitty config
# Paired with starship.toml in this repo for the full look.
#
# ─── Named palette (kitty.conf has no variables — these are the canonical
#     hex values; every color setting below refers to one of these by name
#     in a trailing comment so the file stays self-documenting) ──────────────
#
#   matrix_void       #000000   pure black — window background, active tab fg
#   matrix_shadow     #1a1a1a   near-black — inactive tab background
#   matrix_deep       #003b00   deepest green — bright-black (dim text)
#   matrix_dim        #008f11   dim green — ANSI red slot (errors stay visible)
#   matrix_forest     #00b32c   muted green — ANSI blue slot
#   matrix_green      #00ff41   signature matrix green — primary foreground
#   matrix_neon       #39ff14   neon green — ANSI yellow / highlights
#   matrix_laser      #7fff00   lime — brightest accent
#   matrix_mint       #00ff9c   mint — ANSI magenta slot
#   matrix_haze       #22dd66   hazy green — ANSI cyan slot
#   matrix_wash       #66ffaa   washed-out green — bright cyan
#   matrix_bleach     #b6ffb6   almost-white green — bright white (bold text)
#   tab_inactive_fg   #b0b0b0   dim gray — inactive tab label (the only
#                               non-green in the whole palette, per user)

# ─── Font ────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# ─── Cursor ──────────────────────────────────────────────────────────────────
cursor                  #00ff41   # matrix_green
cursor_text_color       #000000   # matrix_void
cursor_shape            block
cursor_blink_interval   0

# ─── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines 20000

# ─── Window layout ───────────────────────────────────────────────────────────
window_padding_width    8
confirm_os_window_close 0
# Titlebar kept (default) so the window stays draggable in non-fullscreen mode.
# `macos_titlebar_color background` below recolors it to matrix black so it
# blends with the rest of the theme.

# ─── Tab bar (bottom, tabs left, status right) ───────────────────────────────
tab_bar_edge            bottom
tab_bar_align           left
tab_bar_style           custom
tab_bar_min_tabs        1
tab_bar_background      #000000   # matrix_void
tab_title_template      "{index}: {title}"

active_tab_foreground   #000000   # matrix_void
active_tab_background   #00ff41   # matrix_green
active_tab_font_style   bold

inactive_tab_foreground #b0b0b0   # tab_inactive_fg
inactive_tab_background #1a1a1a   # matrix_shadow
inactive_tab_font_style normal

# ─── Default fg/bg & selection ───────────────────────────────────────────────
foreground              #00ff41   # matrix_green
background              #000000   # matrix_void
selection_foreground    #000000   # matrix_void
selection_background    #00ff41   # matrix_green

# ─── ANSI palette (all greens — color7 "white" is remapped to matrix_green so
#     TUIs like Claude Code that render default text in ANSI white stay
#     on-brand instead of showing off-white) ──────────────────────────────────
color0  #000000   # matrix_void    (black)
color1  #008f11   # matrix_dim     (red slot)
color2  #00ff41   # matrix_green   (green)
color3  #39ff14   # matrix_neon    (yellow slot)
color4  #00b32c   # matrix_forest  (blue slot)
color5  #00ff9c   # matrix_mint    (magenta slot)
color6  #22dd66   # matrix_haze    (cyan slot)
color7  #00ff41   # matrix_green   (white → remapped to matrix_green)

color8  #003b00   # matrix_deep    (bright black)
color9  #00b32c   # matrix_forest  (bright red)
color10 #39ff14   # matrix_neon    (bright green)
color11 #7fff00   # matrix_laser   (bright yellow)
color12 #00ff41   # matrix_green   (bright blue)
color13 #00ff9c   # matrix_mint    (bright magenta)
color14 #66ffaa   # matrix_wash    (bright cyan)
color15 #b6ffb6   # matrix_bleach  (bright white)

# ─── macOS niceties ──────────────────────────────────────────────────────────
macos_option_as_alt     yes
macos_titlebar_color    background

# ─── Bell ────────────────────────────────────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0.0
